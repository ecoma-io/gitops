# Overlay này được tạo tự động bởi GitHub Actions khi PR #42 được mở.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ecoma-preview-42
resources:
  - ../../base
patches:
  - target:
      group: traefik.io
      version: v1alpha1
      kind: Middleware
      name: account-env-header
    patch: |-
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: account-env-header
      spec:
        headers:
          customResponseHeaders:
            X-Environment: preview-42
  - target:
      group: traefik.io
      version: v1alpha1
      kind: IngressRoute
      name: account
    patch: |-
      - op: replace
        path: /spec/routes/0/match
        value: "Host(`pr42-account.ecoma.io`)"
