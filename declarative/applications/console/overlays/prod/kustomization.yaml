apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ecoma-prod
resources:
  - ../../base
patches:
  - target:
      group: traefik.io
      version: v1alpha1
      kind: Middleware
      name: console-env-header
    patch: |-
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: console-env-header
      spec:
        headers:
          customResponseHeaders:
            X-Environment: prod
  - target:
      group: traefik.io
      version: v1alpha1
      kind: IngressRoute
      name: console
    patch: |-
      - op: replace
        path: /spec/routes/0/match
        value: "Host(`console.ecoma.io`)"
  - target:
      kind: Deployment
      name: console
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
