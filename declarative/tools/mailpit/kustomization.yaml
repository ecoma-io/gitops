apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mailpit

helmCharts:
  - name: mailpit
    repo: https://jouve.github.io/charts/
    releaseName: mailpit
    namespace: mailpit
    version: 0.32.5
    valuesFile: mailpit.values.yaml

# Workaround: kustomize v5.8.1 namespace transformer does not apply to
# helmCharts-generated resources. Use explicit patch to inject namespace.
patches:
  - target:
      kind: ".*"
    patch: |-
      - op: add
        path: /metadata/namespace
        value: mailpit
