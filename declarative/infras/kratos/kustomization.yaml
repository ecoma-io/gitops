apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: infra

resources:
  - sealed-secret.yaml
  - seed-job.yaml
  - ingress.yaml
  - strip-prefix.yaml

helmCharts:
  - name: kratos
    repo: https://k8s.ory.sh/helm/charts
    releaseName: kratos
    namespace: infra
    version: 0.61.1
    valuesFile: kratos.values.yaml

# Workaround: kustomize v5.8.1 namespace transformer does not apply to
# helmCharts-generated resources. Use explicit patch to inject namespace.
patches:
  - target:
      kind: ".*"
    patch: |-
      - op: add
        path: /metadata/namespace
        value: infra

  # Explicitly declare persistentVolumeClaimRetentionPolicy to match K8s default.
  # Without this, K8s injects {whenDeleted: Retain, whenScaled: Retain} at runtime
  # causing ArgoCD ServerSideDiff to show a perpetual diff.
  - target:
      group: apps
      kind: StatefulSet
    patch: |-
      - op: add
        path: /spec/persistentVolumeClaimRetentionPolicy
        value:
          whenDeleted: Retain
          whenScaled: Retain
