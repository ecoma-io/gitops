# ORY Kratos — Identity & User Management
# Public API: kratos-public.infra.svc.cluster.local:80
# Admin API: kratos-admin.infra.svc.cluster.local:80
# DB: PostgreSQL (kratos database, auto-migrated on startup)
# SMTP: mailpit-smtp.infra.svc.cluster.local:25
# ==============================================================================

# Disable helm.sh/hook annotations on Secret to prevent ArgoCD stripping
secret:
  enableDefaultAnnotations: false
  secretAnnotations: {}

# Database migration via initContainer (avoids helm hook issues with ArgoCD)
kratos:
  automigration:
    enabled: true
    type: initContainer
    extraEnv:
      - name: DSN
        valueFrom:
          secretKeyRef:
            name: kratos-db-url
            key: dsn

  config:
    cookies:
      domain: ecoma.io
      path: /
      same_site: Lax

    serve:
      public:
        port: 4433
        base_url: https://api.ecoma.io/identity
      admin:
        port: 4434

    selfservice:
      default_browser_return_url: https://account.ecoma.io/

      flows:
        login:
          ui_url: https://account.ecoma.io/login
        registration:
          ui_url: https://account.ecoma.io/registration
        recovery:
          ui_url: https://account.ecoma.io/recovery
        verification:
          ui_url: https://account.ecoma.io/verification
        settings:
          ui_url: https://account.ecoma.io/settings
        logout:
          after:
            default_browser_return_url: https://account.ecoma.io/login

      methods:
        password:
          enabled: true

        # Time-based OTP (Google Authenticator, Authy, etc.)
        totp:
          enabled: true
          config:
            issuer: Ecoma

        # WebAuthn — used as 2FA (not passwordless)
        webauthn:
          enabled: true
          config:
            passwordless: false
            rp:
              id: ecoma.io
              display_name: Ecoma
              origins:
                - https://ecoma.io

        # Email OTP — one-time code sent to email
        code:
          enabled: true
          config:
            lifespan: 15m

        # Backup lookup secrets (recovery codes when 2FA device is lost)
        lookup_secret:
          enabled: true

    identity:
      default_schema_id: default
      schemas:
        - id: default
          url: file:///etc/config/identity.default.schema.json

    # Hydra integration: Kratos acts as the OAuth2 login/consent UI for Hydra.
    # When /self-service/login/browser?login_challenge=... is received, Kratos
    # validates the challenge with Hydra and accepts it after successful login.
    oauth2_provider:
      url: http://hydra-admin.infra.svc.cluster.local:4445

    courier:
      smtp:
        connection_uri: smtp://mailpit-smtp.infra.svc.cluster.local:25/?disable_starttls=true
        from_address: noreply@ecoma.io
        from_name: Ecoma

  identitySchemas:
    "identity.default.schema.json": |
      {
        "$id": "https://schemas.ory.sh/presets/kratos/identity.email.schema.json",
        "$schema": "http://json-schema.org/draft-07/schema#",
        "title": "Person",
        "type": "object",
        "properties": {
          "traits": {
            "type": "object",
            "properties": {
              "email": {
                "type": "string",
                "format": "email",
                "title": "Email",
                "ory.sh/kratos": {
                  "credentials": {
                    "password": {
                      "identifier": true
                    }
                  },
                  "recovery": {
                    "via": "email"
                  },
                  "verification": {
                    "via": "email"
                  }
                }
              },
              "username": {
                "type": "string",
                "title": "Username",
                "minLength": 3,
                "maxLength": 50,
                "pattern": "^[a-zA-Z0-9_-]+$",
                "ory.sh/kratos": {
                  "credentials": {
                    "password": {
                      "identifier": true
                    }
                  }
                }
              }
            },
            "required": ["email", "username"],
            "additionalProperties": false
          }
        }
      }

# InitContainer creates the 'kratos' database if it doesn't exist.
# Derives the postgres admin URL from kratos-db-url by replacing /kratos? -> /postgres?
deployment:
  extraEnv:
    - name: DSN
      valueFrom:
        secretKeyRef:
          name: kratos-db-url
          key: dsn
  extraInitContainers: |
    - name: db-init
      image: postgres:16-alpine
      command:
        - sh
        - -c
        - |
          PGURL=$(echo "$DSN" | sed 's|/kratos?|/postgres?|')
          psql "$PGURL" -tc "SELECT 1 FROM pg_database WHERE datname = 'kratos'" | \
            grep -q 1 || psql "$PGURL" -c "CREATE DATABASE kratos WITH OWNER postgres;"
      env:
        - name: DSN
          valueFrom:
            secretKeyRef:
              name: kratos-db-url
              key: dsn
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
