---
# SealedSecret — pg-superuser
# Fixed PostgreSQL superuser credentials managed by Sealed Secrets.
# Referenced by spec.superuserSecret in cluster.yaml so CNPG uses a stable,
# deterministic password instead of auto-generating a random one each bootstrap.
# To rotate: re-seal with new password, update all db-url sealed secrets, and
# ensure the Cluster CRD still references this secret name.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: pg-superuser
  namespace: infra
spec:
  encryptedData:
    password: 
    username: 
  template:
    metadata:
      creationTimestamp: null
      name: pg-superuser
      namespace: infra
    type: Opaque
