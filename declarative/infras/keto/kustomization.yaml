apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: infra

resources:
  - sealed-secret.yaml

helmCharts:
  - name: keto
    repo: https://k8s.ory.sh/helm/charts
    releaseName: keto
    namespace: infra
    version: 0.61.1
    valuesFile: keto.values.yaml

# Workaround: kustomize v5.8.1 namespace transformer does not apply to
# helmCharts-generated resources. Use explicit patch to inject namespace.
patches:
  - target:
      kind: ".*"
    patch: |-
      - op: add
        path: /metadata/namespace
        value: infra
