apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: infra

resources:
  - sealed-secret.yaml
  - hydra-sealed-secret.yaml
  - grafana-oauth-sealed.yaml
  - argocd-oauth-sealed.yaml
  - coder-oauth-sealed.yaml
  - ingress.yaml
  - register-grafana-job.yaml
  - register-argocd-job.yaml
  - register-coder-job.yaml

helmCharts:
  - name: hydra
    repo: https://k8s.ory.sh/helm/charts
    releaseName: hydra
    namespace: infra
    version: 0.61.1
    valuesFile: hydra.values.yaml

# Workaround: kustomize v5.8.1 namespace transformer does not apply to
# helmCharts-generated resources. Use explicit patch to inject namespace.
patches:
  - target:
      kind: ".*"
    patch: |-
      - op: add
        path: /metadata/namespace
        value: infra
