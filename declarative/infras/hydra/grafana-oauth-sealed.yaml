# SealedSecret: Grafana OAuth2 client credentials (infra copy)
# Used by hydra-register-grafana Job to register the OAuth2 client in Hydra.
# Must contain the same client_id/client_secret as monitoring/grafana-oauth.
# ==============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: grafana-oauth
  namespace: infra
spec:
  encryptedData:
    client_id: 
    client_secret: 
  template:
    metadata:
      name: grafana-oauth
      namespace: infra
    type: Opaque
