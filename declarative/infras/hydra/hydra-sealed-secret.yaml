# SealedSecret — hydra
# Contains SECRETS_SYSTEM and SECRETS_COOKIE for Hydra.
# These values MUST remain stable — changing them breaks JWK key decryption.
# ==============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: hydra
  namespace: infra
spec:
  encryptedData:
    dsn: 
    secretsCookie: 
    secretsSystem: 
  template:
    metadata:
      creationTimestamp: null
      name: hydra
      namespace: infra
    type: Opaque
