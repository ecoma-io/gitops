# Job: Register Coder as an OAuth2 client in Hydra
# Runs as a PostSync hook so Hydra is guaranteed to be running.
# Idempotent: POST to create; on HTTP 409, PUT to update.
# ==============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: hydra-register-coder
  namespace: infra
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: register
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -exc
            - |
              HYDRA_ADMIN="http://hydra-admin.infra.svc.cluster.local:4445"
              # Wait for Hydra Admin API to be ready
              until curl -sf "${HYDRA_ADMIN}/health/ready"; do
                echo "Waiting for Hydra Admin API..."
                sleep 5
              done

              PAYLOAD="{
                \"client_id\": \"${CLIENT_ID}\",
                \"client_secret\": \"${CLIENT_SECRET}\",
                \"client_name\": \"Coder\",
                \"grant_types\": [\"authorization_code\", \"refresh_token\"],
                \"response_types\": [\"code\", \"id_token\"],
                \"scope\": \"openid email profile offline_access\",
                \"redirect_uris\": [\"https://coder.ecoma.io/api/v2/users/oidc/callback\"],
                \"post_logout_redirect_uris\": [\"https://coder.ecoma.io\"],
                \"token_endpoint_auth_method\": \"client_secret_post\",
                \"skip_consent\": true
              }"

              # Try POST (create). If client already exists (409), fall back to PUT (update).
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                "${HYDRA_ADMIN}/admin/clients" \
                -H "Content-Type: application/json" \
                -d "${PAYLOAD}")

              if [ "$HTTP_CODE" = "201" ]; then
                echo "Coder OAuth2 client created successfully."
              elif [ "$HTTP_CODE" = "409" ]; then
                echo "Client already exists, updating..."
                curl -sf -X PUT \
                  "${HYDRA_ADMIN}/admin/clients/${CLIENT_ID}" \
                  -H "Content-Type: application/json" \
                  -d "${PAYLOAD}"
                echo ""
                echo "Coder OAuth2 client updated successfully."
              else
                echo "Failed to register client. HTTP status: ${HTTP_CODE}"
                exit 1
              fi
          env:
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: coder-oauth
                  key: client_id
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: coder-oauth
                  key: client_secret
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
