apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - bucket-init-job.yaml

helmCharts:
  - name: tempo
    repo: https://grafana.github.io/helm-charts
    releaseName: tempo
    namespace: monitoring
    version: 1.24.4
    valuesFile: tempo.values.yaml

# Workaround: kustomize v5.8.1 namespace transformer does not apply to
# helmCharts-generated resources. Use explicit patch to inject namespace.
patches:
  - target:
      kind: ".*"
    patch: |-
      - op: add
        path: /metadata/namespace
        value: monitoring

  # Explicitly declare persistentVolumeClaimRetentionPolicy to match K8s default.
  # Without this, K8s injects {whenDeleted: Retain, whenScaled: Retain} at runtime
  # causing ArgoCD ServerSideDiff to show a perpetual diff.
  - target:
      group: apps
      kind: StatefulSet
    patch: |-
      - op: add
        path: /spec/persistentVolumeClaimRetentionPolicy
        value:
          whenDeleted: Retain
          whenScaled: Retain
