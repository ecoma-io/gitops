apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - bucket-init-job.yaml

helmCharts:
  - name: loki
    repo: https://grafana.github.io/helm-charts
    releaseName: loki
    namespace: monitoring
    version: 6.55.0
    valuesFile: loki.values.yaml

# Workaround: kustomize v5.8.1 namespace transformer does not apply to
# helmCharts-generated resources. Use explicit patch to inject namespace.
patches:
  - target:
      kind: ".*"
    patch: |-
      - op: add
        path: /metadata/namespace
        value: monitoring
