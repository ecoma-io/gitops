# SealedSecret: Grafana OAuth2 client credentials
# Decrypts to Secret with keys: client_id, client_secret
# Used by Grafana to authenticate with Hydra (OAuth2/OIDC provider)
# ==============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: grafana-oauth
  namespace: monitoring
spec:
  encryptedData:
    client_id: 
    client_secret: 
  template:
    metadata:
      name: grafana-oauth
      namespace: monitoring
    type: Opaque
