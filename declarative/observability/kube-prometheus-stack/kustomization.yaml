apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

# Prometheus Operator CRDs are very large (>256 KB) and exceed the Kubernetes
# 262144-byte limit for metadata.annotations.last-applied-configuration.
# ServerSideApply bypasses this by tracking field ownership in the API server
# instead of storing the full manifest in an annotation.
commonAnnotations:
  

resources:
  - grafana-oauth-sealed.yaml

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    releaseName: kube-prometheus-stack
    namespace: monitoring
    version: 83.3.0
    valuesFile: kube-prometheus-stack.values.yaml
    includeCRDs: true
