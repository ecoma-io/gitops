# kube-prometheus-stack v83.3.0
# Installs: Prometheus Operator, Prometheus, Grafana, AlertManager,
#           node-exporter, kube-state-metrics
# Namespace: monitoring
# ==============================================================================

# ---------------------------------------------------------------------------
# Prometheus Operator
# ---------------------------------------------------------------------------
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Prometheus
# ---------------------------------------------------------------------------
prometheus:
  prometheusSpec:
    # 7-day local retention; long-term goes to Mimir
    retention: 7d
    retentionSize: 40GB

    # Persistent storage on NVMe
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nvme
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    # Forward all metrics to Mimir for long-term storage
    remoteWrite:
      - url: http://mimir-gateway.monitoring.svc:80/api/v1/push
        headers:
          X-Scope-OrgID: ecoma
        queueConfig:
          maxSamplesPerSend: 5000
          capacity: 10000

    # Discover ServiceMonitors / PodMonitors / PrometheusRules
    # across ALL namespaces (not only those matching helm release labels)
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi

# ---------------------------------------------------------------------------
# AlertManager
# ---------------------------------------------------------------------------
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: nvme
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# ---------------------------------------------------------------------------
# Grafana
# ---------------------------------------------------------------------------
grafana:
  # OAuth2 client credentials from SealedSecret (grafana-oauth)
  envFromSecrets:
    - name: grafana-oauth

  grafana.ini:
    server:
      domain: grafana.ecoma.io
      root_url: https://grafana.ecoma.io

    # ── OAuth2/OIDC via ORY Hydra ──────────────────────────────────────────
    auth.generic_oauth:
      enabled: true
      name: Ecoma SSO
      allow_sign_up: true
      auto_login: true
      client_id: $__env{client_id}
      client_secret: $__env{client_secret}
      scopes: openid email profile offline_access
      # auth_url is browser-facing (external redirect)
      auth_url: https://oauth.ecoma.io/oauth2/auth
      # token_url and api_url are server-side (use internal cluster URLs for reliability)
      token_url: http://hydra-public.infra.svc.cluster.local:4444/oauth2/token
      api_url: http://hydra-public.infra.svc.cluster.local:4444/userinfo
      signout_redirect_url: https://oauth.ecoma.io/oauth2/sessions/logout?post_logout_redirect_uri=https%3A%2F%2Fgrafana.ecoma.io%2Flogin
      # Map OIDC claims to Grafana user fields.
      # Hydra wraps custom claims under 'ext' in /userinfo; use JMESPath fallback.
      email_attribute_path: ext.email || email
      name_attribute_path: ext.name || name
      login_attribute_path: ext.preferred_username || preferred_username
      # Role mapping from Hydra token hook claims (injected by token-hook service via Keto).
      # grafana_role = 'GrafanaAdmin' for platform#superadmin
      # grafana_role = 'Admin'        for platform#grafana_admin
      # grafana_role absent           → login blocked (role_attribute_strict)
      role_attribute_path: ext.grafana_role || grafana_role
      role_attribute_force_sync: true
      # Allow Grafana server admin assignment (required to honor grafana_role=GrafanaAdmin).
      # Without this, GrafanaAdmin claim is ignored and login is blocked by role_attribute_strict.
      allow_assign_grafana_admin: true
      # Block users with no platform role from accessing Grafana.
      # Prevents customers / ungranted Kratos identities from logging in.
      role_attribute_strict: true
      # Use PKCE for added security
      use_pkce: true
    auth:
      disable_login_form: true
      disable_signout_menu: false

  # Disable auto-generated Prometheus datasource (Mimir is our default metrics source)
  sidecar:
    datasources:
      defaultDatasourceEnabled: false
    dashboards:
      enabled: true
      searchNamespace: ALL
      
  # Pre-configure datasources for the full observability stack
  additionalDataSources:
    - name: Mimir
      type: prometheus
      url: http://mimir-gateway.monitoring.svc:80/prometheus
      access: proxy
      isDefault: true
      jsonData:
        httpHeaderName1: "X-Scope-OrgID"
      secureJsonData:
        httpHeaderValue1: "ecoma"
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc:80
      access: proxy
      jsonData:
        httpHeaderName1: "X-Scope-OrgID"
      secureJsonData:
        httpHeaderValue1: "ecoma"
    - name: Tempo
      type: tempo
      url: http://tempo.monitoring.svc:3200
      access: proxy
      jsonData:
        tracesToLogsV2:
          datasourceUid: "Loki"
          spanStartTimeShift: "-1h"
          spanEndTimeShift: "1h"
          tags:
            - key: "k8s.pod.name"
              value: "pod"
            - key: "k8s.namespace.name"
              value: "namespace"
        lokiSearch:
          datasourceUid: "Loki"
        serviceMap:
          datasourceUid: "Mimir"

  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.ecoma.io
    paths:
      - /

  persistence:
    enabled: true
    storageClassName: nvme
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  deploymentStrategy:
    type: Recreate
    rollingUpdate: null



# ---------------------------------------------------------------------------
# node-exporter
# ---------------------------------------------------------------------------
prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ---------------------------------------------------------------------------
# kube-state-metrics
# ---------------------------------------------------------------------------
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ---------------------------------------------------------------------------
# k3s: disable components that are not reachable
# k3s embeds controller-manager and scheduler inside the k3s binary
# They don't expose separate /metrics endpoints accessible by Prometheus.
# k3s does NOT run kube-proxy (uses built-in load balancer).
# k3s uses an embedded SQLite/etcd — NOT accessible via the standard port.
# ---------------------------------------------------------------------------
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false

kubeProxy:
  enabled: false
