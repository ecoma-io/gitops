# StorageClass for OpenEBS LVM-LocalPV (HDD)
# Maps to LVM Volume Group vg-hdd on the server (see docs/infrastructure/hardware.md)
# ==============================================================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: hdd
provisioner: local.csi.openebs.io
parameters:
  storage: lvm
  volgroup: vg-hdd
  fstype: xfs
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true
