apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ecoma-staging
  namespace: argocd
spec:
  description: Ecoma staging environment applications
  sourceRepos:
    - https://github.com/ecoma-io/gitops.git
  destinations:
    - namespace: 'ecoma-staging'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'