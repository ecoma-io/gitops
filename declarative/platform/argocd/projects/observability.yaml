apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
spec:
  description: Monitoring, logging, and tracing stack (Prometheus, Loki, Tempo, Mimir, Alloy)
  sourceRepos:
    - https://github.com/ecoma-io/gitops.git
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
