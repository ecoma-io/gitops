apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infras
  namespace: argocd
spec:
  description: Shared infrastructure services consumed by applications (PostgreSQL, Redis, NATS, SeaweedFS, Kratos, Keto)
  sourceRepos:
    - https://github.com/ecoma-io/gitops.git
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
